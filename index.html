<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文字冒險遊戲</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 側邊欄 -->
  <div id="sidebar" class="sidebar">
    <div id="sidebarMain" class="sidebar-content">
      <button id="logManageBtn" type="button">文字資料管理</button>
      <div class="tools-panel">
        <button id="clearLogsBtn" type="button">清除文字資料</button>
        <button id="exportLogsBtn" type="button">匯出文字資料</button>
        <button id="downloadBtn" class="hidden" type="button">下載</button>
      </div>
      <button id="logoutBtn" class="logout-btn">登出</button>
    </div>
  </div>
  <button id="sidebarToggle" class="sidebar-toggle">☰</button>

  <div id="connectionBanner" class="connection-banner hidden" data-state="ok">
    <span id="connectionMessage">⚠️ 連線中斷/心跳失敗，指令已暫停</span>
    <div class="connection-actions">
      <button id="reconnectBtn" type="button">重新連線</button>
      <button id="backToLoginBtn" type="button">返回登入</button>
    </div>
  </div>

  <!-- 遊戲主體 -->
  <div id="game">
    <div id="chat" class="chat"></div>
    <div id="composer" class="composer">
      <textarea id="commandInput" maxlength="500" rows="2" placeholder="輸入指令..." class="command-input"></textarea>
      <button id="sendBtn" class="send-btn">送出</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

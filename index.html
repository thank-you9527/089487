<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>保溫管計價工具</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>保溫管計價工具</h1>

  <div class="field">
    <label for="diameterSelect">管徑</label>
    <select id="diameterSelect">
      <option value="">選擇管徑</option>
    </select>
  </div>

  <div class="field">
    <label for="thicknessSelect">厚度</label>
    <select id="thicknessSelect" disabled>
      <option value="">選擇厚度</option>
    </select>
  </div>

  <div id="specInfo" class="info"></div>

  <div class="field">
    <label for="discountInput">折數 (%)</label>
    <input type="number" id="discountInput" min="0" max="100" step="0.01" />
  </div>

  <div class="field">
    <label for="taxSelect">稅金</label>
    <select id="taxSelect">
      <option value="0">免稅</option>
      <option value="5">5%</option>
    </select>
  </div>

  <div id="result" class="result"></div>

  <script src="script.js"></script>
</body>
</html>
